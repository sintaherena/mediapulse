name: App Deployment

# Requires GitHub secret: DATABASE_URL (PostgreSQL URL for migrate deploy during build).
on:
  push:
    branches:
      - main

jobs:
  agent-auth-api:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Prepare env variables
        run: |
          cp env.example .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
        working-directory: packages/env

      - name: Bootstrap env symlinks
        run: ./dev-bootstrap.sh

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter=@workspace/database run db:generate

      - name: Build
        run: pnpm build --filter=agent-auth-api

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to fly.io
        working-directory: ./apps/agent-auth-api
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  agent-data-api:
